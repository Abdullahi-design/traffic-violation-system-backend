app = "traffic-violation-api"
primary_region = "lhr"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  JWT_ALGORITHM = "HS256"
  JWT_EXPIRATION_MINUTES = "1440"
  UPLOAD_DIR = "/app/uploads"
  CORS_ORIGINS = "https://traffic-violation-system-eight.vercel.app,http://localhost:3000"

[[vm]]
  size = "shared-cpu-1x"
  memory = 512
